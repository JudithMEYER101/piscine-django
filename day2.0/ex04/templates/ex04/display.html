<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex04 Movies</title>
</head>
<body>
    <table>
        <tr>
            <th>Episode</th>
            <th>Title</th>
            <th>Opening Crawl</th>
            <th>Director</th>
            <th>Producer</th>
            <th>Release Date</th>
        </tr>

        {% for movie in movies %}
        <tr>
            <td>{{ movie.0 }}</td>
            <td>{{ movie.1 }}</td>
            <td>{{ movie.2 }}</td>
            <td>{{ movie.3 }}</td>
            <td>{{ movie.4 }}</td>
            <td>{{ movie.5 }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
