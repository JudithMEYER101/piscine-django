<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Remove Movie</title>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <select name="title">
            {% for title in titles %}
                <option value="{{ title.0 }}">{{ title.0 }}</option>
            {% endfor %}
        </select>

        <button type="submit" name="remove">Remove</button>
    </form>
</body>
</html>
