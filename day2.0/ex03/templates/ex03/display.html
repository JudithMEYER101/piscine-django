<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex03 Movies</title>
</head>
<body>
    <table>
        <tr>
            <th>Episode</th>
            <th>Title</th>
            <th>Opening Crawl</th>
            <th>Director</th>
            <th>Producer</th>
            <th>Release Date</th>
        </tr>

        {% for movie in movies %}
        <tr>
            <td>{{ movie.episode_nb }}</td>
            <td>{{ movie.title }}</td>
            <td>{{ movie.opening_crawl }}</td>
            <td>{{ movie.director }}</td>
            <td>{{ movie.producer }}</td>
            <td>{{ movie.release_date }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
