<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Movie</title>
</head>
<body>
    <form method="post">
        {% csrf_token %}

        <select name="title">
            {% for movie in movies %}
                <option value="{{ movie.title }}">{{ movie.title }}</option>
            {% endfor %}
        </select>

        <textarea name="opening_crawl"></textarea>

        <button type="submit">Update</button>
    </form>
</body>
</html>
