<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Remove Movie</title>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <select name="title">
            {% for movie in movies %}
                <option value="{{ movie.title }}">{{ movie.title }}</option>
            {% endfor %}
        </select>

        <button type="submit" name="remove">Remove</button>
    </form>
</body>
</html>
