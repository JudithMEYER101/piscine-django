<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex02 : Premier formulaire.</title>
</head>
<body>
    <h1>Ex02 : Premier formulaire.</h1>

    <form method="post">
        {% csrf_token %}
        {{ form }}
        <button type="submit">Submit</button>
    </form>

    <h2>History</h2>

    <ul>
        {% for entry in history %}
            <li>{{ entry }}</li>
        {% empty %}
            <li>No entries yet.</li>
        {% endfor %}
    </ul>
</body>
</html>
